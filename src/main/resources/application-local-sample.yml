spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/[db]
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

jwt:
  # 최소 32자 이상의 긴 문자열을 권장
  secret:
  expiration-time: # 토큰 유효 시간 (예: 24시간 = 24 * 60 * 60 * 1000ms)