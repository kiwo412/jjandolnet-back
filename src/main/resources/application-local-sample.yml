spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/[db]
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      data-locations: classpath:db/init/test-data.sql
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true # Hibernate가 테이블을 다 만든 후 SQL 실행
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 300

jwt:
  # 최소 32자 이상의 긴 문자열을 권장
  secret:
  expiration-time: # 토큰 유효 시간 (예: 24시간 = 24 * 60 * 60 * 1000ms)