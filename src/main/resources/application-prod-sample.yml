spring:
  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?user=postgres.[user]&password=[password]
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    #database-platform: org.hibernate.dialect.PostgreSQLDialect

  web:
    #local p6spy
    p6spy:
      enable-logging: true
      # 쿼리 로그 출력 형식 지정 (기본값 외에 사용자 정의 가능)
      logging: slf4j
      multiline: true # 쿼리를 한 줄로 보지 않고 예쁘게 여러 줄로 보여줌


#swagger - local
springdoc:
  #packages-to-scan: com.kin.jjandolnet.api.domain
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
    operationsSorter: method
    display-request-duration: true
  api-docs:
    path: /api-docs